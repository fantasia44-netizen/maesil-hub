{% extends "base.html" %}
{% block title %}온보딩 — 결제수단 등록{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <p class="text-muted">단계 {{ step }}/{{ total }}</p>
  <h3>결제수단 등록</h3>
  <p>{{ plan.name }} ({{ '{:,}'.format(plan.monthly_price or 0) }}원/월)</p>
  <p class="text-muted small">카드 정보는 PortOne을 통해 안전하게 처리되며 서버에 저장되지 않습니다.</p>
  <button class="btn btn-success btn-lg" onclick="register()">카드 등록하기</button>
  <a href="{{ url_for('onboarding.skip_all') }}" class="btn btn-link">건너뛰기</a>
</div></div>

<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<script>
const STORE_ID = "{{ portone_store_id }}";
const CHANNEL = "{{ portone_channel_card }}";

async function register() {
  if (!STORE_ID || !CHANNEL) {
    alert('포트원 설정 미완료. 어드민에 문의하세요.');
    return;
  }
  const res = await PortOne.requestIssueBillingKey({
    storeId: STORE_ID,
    channelKey: CHANNEL,
    billingKeyMethod: 'CARD',
    issueId: 'bk_' + Date.now(),
    issueName: '매실 허브 정기결제 카드 등록',
  });
  if (res.code) { alert('카드 등록 실패: ' + res.message); return; }
  const r = await fetch('{{ url_for("billing.save_billing_key") }}', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({billing_key: res.billingKey, pg: 'card'}),
  });
  const j = await r.json();
  if (j.status !== 'ok') { alert('저장 실패'); return; }
  await fetch('{{ url_for("onboarding.payment_done") }}', {method: 'POST'});
  location.href = '{{ url_for("onboarding.step_seed") }}';
}
</script>
{% endblock %}
